# PostgreSQL Client Authentication Configuration File
# Security-first MVP version for BEC Agent

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local Unix socket access
local   all             postgres                                peer
local   all             all                                     scram-sha-256

# IPv4 local connections
host    all             all             127.0.0.1/32            scram-sha-256

# IPv6 local connections
host    all             all             ::1/128                 scram-sha-256

# Replace the following with your trusted FC egress IP / secure jump host IP
# Example:
# host  bec_agent       bec_user        x.x.x.x/32              scram-sha-256

# Optional: trusted office/home fixed IP for admin access
# host  all             postgres        x.x.x.x/32              scram-sha-256

# Reject everything else by default
host    all             all             0.0.0.0/0               reject
host    all             all             ::0/0                   reject
