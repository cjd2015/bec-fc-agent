# BEC Agent - production nginx.conf
# 域名: datahive.top
# 重要说明：当前阿里云 FC HTTP Trigger 已启用 function 认证。
# 因此不能再使用“裸 proxy_pass -> FC 公网 URL”方式直接代理。
# 正式环境建议：
# 1. 浏览器 -> datahive.top -> ECS Nginx
# 2. Nginx 仅负责静态资源与统一 HTTPS 入口
# 3. /api/ 请求转发到“可进行 FC 签名调用的服务端网关/应用层”
# 4. 由该服务端组件持有 AK/SK 并完成 FC Function Auth 签名
#
# 不推荐：
# - 让前端直接访问 FC 直连地址
# - 在 Nginx 中直接裸转发到受保护的 FC URL
# - 在前端暴露 FC 调用认证信息

server {
    listen 80;
    server_name datahive.top www.datahive.top;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name datahive.top www.datahive.top;

    ssl_certificate     /etc/nginx/ssl/datahive.top.pem;
    ssl_certificate_key /etc/nginx/ssl/datahive.top.key;

    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/datahive.top;
    index index.html;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 方案 A（推荐落地方式）:
    # /api/ 不直接反代到 FC 公网地址，而是反代到你自己的受控服务端网关，
    # 例如部署在 ECS 上的轻量 Python/Node 签名代理服务，由该服务持有 AK/SK，
    # 对阿里云 FC 发起带 Function Auth 签名的请求。
    location /api/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        access_log off;
    }
}
