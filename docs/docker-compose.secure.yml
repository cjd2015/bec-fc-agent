version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bec-postgres
    restart: always
    environment:
      POSTGRES_DB: bec_agent
      POSTGRES_USER: bec_user
      POSTGRES_PASSWORD: change_this_to_a_strong_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    mem_limit: 700m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bec_user -d bec_agent"]
      interval: 30s
      timeout: 5s
      retries: 5

# 安全部署说明：
# 1. 必须修改 POSTGRES_PASSWORD 为强密码
# 2. 必须在 pg_hba.conf 中替换允许访问的可信 IP
# 3. 必须通过阿里云安全组限制 5432 访问来源
# 4. 当前 ECS 只建议运行 OpenClaw + Nginx + PostgreSQL
# 5. Python/FastAPI 服务继续部署到阿里云函数计算 FC
