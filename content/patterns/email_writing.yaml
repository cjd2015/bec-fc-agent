module: pattern
source: "Business email phrases compiled from public BEC prep resources"
version: 1
patterns:
  - pattern_text: "Could you please + verb ...?"
    scene_type: "email"
    function_type: "polite_request"
    example_text: "Could you please share the updated deck by Thursday?"
    slot_desc: "verb 短语，可替换为 deliver documents / confirm details"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "I am reaching out to + verb ..."
    scene_type: "email"
    function_type: "introduction"
    example_text: "I am reaching out to confirm your availability for next week's review."
    slot_desc: "verb 表示目的，如 confirm / share / request"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "This is a friendly reminder that ..."
    scene_type: "email"
    function_type: "reminder"
    example_text: "This is a friendly reminder that invoice 2037 is due on Friday."
    slot_desc: "后面接事项 + 截止时间"
    level: "BEC Preliminary"
    difficulty: "medium"
  - pattern_text: "Please find attached ..."
    scene_type: "email"
    function_type: "attachment"
    example_text: "Please find attached the supplier workshop minutes."
    slot_desc: "文件类型 + 额外说明"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "Let me know if you have any questions about ..."
    scene_type: "email"
    function_type: "closing"
    example_text: "Let me know if you have any questions about the revised scope."
    slot_desc: "可替换为 report / plan / invoice"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "We regret to inform you that ..."
    scene_type: "email"
    function_type: "formal_notice"
    example_text: "We regret to inform you that the shipment has been delayed."
    slot_desc: "用于告知不利消息"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "To ensure + noun phrase ..., we will + action"
    scene_type: "email"
    function_type: "assurance"
    example_text: "To ensure a smooth rollout, we will keep you updated daily."
    slot_desc: "前半句说明目的，后半句给出行动"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "Would you mind + verb-ing ...?"
    scene_type: "email"
    function_type: "polite_request"
    example_text: "Would you mind sharing the meeting minutes once they are ready?"
    slot_desc: "后接动作"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "I appreciate your prompt feedback on ..."
    scene_type: "email"
    function_type: "appreciation"
    example_text: "I appreciate your prompt feedback on the compliance checklist."
    slot_desc: "后接项目/事项"
    level: "BEC Vantage"
    difficulty: "easy"
  - pattern_text: "If you need any further information, please feel free to contact me."
    scene_type: "email"
    function_type: "closing"
    example_text: "If you need any further information, please feel free to contact me."
    slot_desc: "固定表达"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "We would be grateful if you could ..."
    scene_type: "email"
    function_type: "formal_request"
    example_text: "We would be grateful if you could confirm receipt of the revised PO."
    slot_desc: "动词短语"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "Please note that ..."
    scene_type: "email"
    function_type: "highlight"
    example_text: "Please note that the deadline has been moved to 18 April."
    slot_desc: "重要信息"
    level: "BEC Preliminary"
    difficulty: "easy"
