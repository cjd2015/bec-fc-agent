module: pattern
source: "Meeting facilitation and negotiation formulas from open business English drills"
version: 1
patterns:
  - pattern_text: "Let us move on to + topic"
    scene_type: "meeting"
    function_type: "transition"
    example_text: "Let us move on to the budget implications."
    slot_desc: "topic = agenda 项目"
    level: "BEC Vantage"
    difficulty: "easy"
  - pattern_text: "To summarize, + owner + will + action + by + time"
    scene_type: "meeting"
    function_type: "summary"
    example_text: "To summarize, marketing will deliver the draft deck by Tuesday."
    slot_desc: "owner/action/time 可替换"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "Do you foresee any risks if ...?"
    scene_type: "meeting"
    function_type: "risk_check"
    example_text: "Do you foresee any risks if we ship in Week 24?"
    slot_desc: "if 从句描述计划"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "From our perspective, ..."
    scene_type: "meeting"
    function_type: "opinion"
    example_text: "From our perspective, extending the pilot will improve adoption."
    slot_desc: "后面接观点"
    level: "BEC Vantage"
    difficulty: "easy"
  - pattern_text: "Could we park this topic and revisit once ...?"
    scene_type: "meeting"
    function_type: "time_management"
    example_text: "Could we park this topic and revisit once we have the updated numbers?"
    slot_desc: "once + 条件"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "If I understand correctly, ..."
    scene_type: "meeting"
    function_type: "confirmation"
    example_text: "If I understand correctly, the client expects delivery on Monday."
    slot_desc: "总结对方观点"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "Could we align on + item + so that ...?"
    scene_type: "meeting"
    function_type: "alignment"
    example_text: "Could we align on the escalation path so that everyone knows who to call?"
    slot_desc: "item + 目的"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "If we + concession, could you + commitment?"
    scene_type: "negotiation"
    function_type: "trade_off"
    example_text: "If we extend payment terms, could you increase the order volume?"
    slot_desc: "前后内容互换"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "Help me understand how + request + fits with ..."
    scene_type: "negotiation"
    function_type: "challenge"
    example_text: "Help me understand how the 30% discount fits with the expanded scope."
    slot_desc: "request + existing条件"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "Would it help if we + action so that ...?"
    scene_type: "negotiation"
    function_type: "solution_offer"
    example_text: "Would it help if we add onsite training so that your team can launch faster?"
    slot_desc: "action + 结果"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "To keep things fair, we propose ..."
    scene_type: "negotiation"
    function_type: "proposal"
    example_text: "To keep things fair, we propose a phased rollout with milestone payments."
    slot_desc: "后接方案"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "Could you share the decision timeline so we can ...?"
    scene_type: "negotiation"
    function_type: "timeline"
    example_text: "Could you share the decision timeline so we can reserve manufacturing capacity?"
    slot_desc: "后半部分描述原因"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "To mitigate this risk, we will ..."
    scene_type: "meeting"
    function_type: "mitigation"
    example_text: "To mitigate this risk, we will activate the backup supplier."
    slot_desc: "后面接行动"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "Let me capture that action: + owner + to + verb + by + date"
    scene_type: "meeting"
    function_type: "action_logging"
    example_text: "Let me capture that action: IT to deliver the access audit by Wednesday."
    slot_desc: "owner/verb/date 可替换"
    level: "BEC Vantage"
    difficulty: "medium"
