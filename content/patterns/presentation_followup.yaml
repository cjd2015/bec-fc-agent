module: pattern
source: "Presentation, reporting, and follow-up expressions compiled from open MBA public materials"
version: 1
patterns:
  - pattern_text: "I'd like to begin with + topic"
    scene_type: "presentation"
    function_type: "opening"
    example_text: "I'd like to begin with a quick overview of the pipeline."
    slot_desc: "topic 可替换"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "Here are the three key takeaways: + point A / B / C"
    scene_type: "presentation"
    function_type: "structure"
    example_text: "Here are the three key takeaways: revenue beat plan, churn rose, and we are mitigating."
    slot_desc: "点可替换"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "Moving on to + topic, ..."
    scene_type: "presentation"
    function_type: "transition"
    example_text: "Moving on to customer feedback, let's review the survey insights."
    slot_desc: "topic"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "As you can see from this slide, ..."
    scene_type: "presentation"
    function_type: "data_callout"
    example_text: "As you can see from this slide, APAC is driving 60% of bookings."
    slot_desc: "描述图表"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "This means we need to + action"
    scene_type: "presentation"
    function_type: "insight"
    example_text: "This means we need to secure additional support coverage."
    slot_desc: "action"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "Let me highlight + metric"
    scene_type: "presentation"
    function_type: "focus"
    example_text: "Let me highlight the customer satisfaction score."
    slot_desc: "metric"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "Our recommendation is to + action because ..."
    scene_type: "presentation"
    function_type: "recommendation"
    example_text: "Our recommendation is to extend the pilot because adoption is still below target."
    slot_desc: "action + reason"
    level: "BEC Higher"
    difficulty: "medium"
  - pattern_text: "Thank you for the discussion—I'll circulate the minutes and owners by + time"
    scene_type: "follow_up"
    function_type: "closing"
    example_text: "Thank you for the discussion—I'll circulate the minutes and owners by end of day."
    slot_desc: "time"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "Please let me know if I missed anything in the summary below."
    scene_type: "follow_up"
    function_type: "verification"
    example_text: "Please let me know if I missed anything in the summary below."
    slot_desc: "固定"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "Attached is + deliverable; kindly review by + deadline"
    scene_type: "follow_up"
    function_type: "handoff"
    example_text: "Attached is the draft contract; kindly review by Thursday."
    slot_desc: "deliverable + deadline"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "Based on today's decision, we will + plan"
    scene_type: "follow_up"
    function_type: "next_steps"
    example_text: "Based on today's decision, we will notify the vendor and start onboarding."
    slot_desc: "plan"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "Could you confirm whether + statement + so we can ...?"
    scene_type: "follow_up"
    function_type: "confirmation"
    example_text: "Could you confirm whether legal approved the clause so we can finalize the doc?"
    slot_desc: "statement + reason"
    level: "BEC Vantage"
    difficulty: "medium"
  - pattern_text: "To recap, we agreed on + summary"
    scene_type: "follow_up"
    function_type: "summary"
    example_text: "To recap, we agreed on weekly check-ins and a shared dashboard."
    slot_desc: "summary"
    level: "BEC Preliminary"
    difficulty: "easy"
  - pattern_text: "I'll follow up with + person + about + topic"
    scene_type: "follow_up"
    function_type: "action"
    example_text: "I'll follow up with procurement about the PO number."
    slot_desc: "person/topic"
    level: "BEC Preliminary"
    difficulty: "easy"
